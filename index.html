<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TC 자동 생성기 (구글 시트 자동 연동)</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--border:rgba(255,255,255,0.08);--accent:#4f8fff;--text:#e8eaf0;--text2:#8b90a8;--success:#3ecf8e}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);padding:20px;line-height:1.6}
  .container{max-width:1000px;margin:0 auto}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}
  header{text-align:center;margin-bottom:30px}
  label{display:block;font-size:13px;color:var(--text2);margin-bottom:8px}
  input,textarea{width:100%;background:#0a0c10;border:1px solid var(--border);border-radius:8px;padding:12px;color:#fff;margin-bottom:15px;font-family:inherit}
  textarea{height:160px;resize:vertical}
  .btn-group{display:flex;gap:10px}
  button{flex:1;padding:15px;border-radius:8px;border:none;cursor:pointer;font-weight:600;transition:0.2s}
  #genBtn{background:var(--accent);color:#fff}
  #sendBtn{background:var(--success);color:#fff;display:none}
  .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;background:#555}
  .status-dot.ok{background:var(--success)}
  table{width:100%;border-collapse:collapse;margin-top:20px;font-size:12px}
  th,td{border:1px solid var(--border);padding:10px;text-align:left}
  th{background:rgba(255,255,255,0.05)}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>TC 자동 생성기</h1>
    <p style="color:var(--text2)">보안 오류 차단 및 구글 시트 자동 전송 모드</p>
  </header>

  <div class="card">
    <label>Gemini API Key <span id="geminiDot" class="status-dot"></span></label>
    <input type="password" id="apiKey" placeholder="AIza... 입력">
    
    <label>Apps Script URL (배포된 웹 앱 URL) <span id="scriptDot" class="status-dot"></span></label>
    <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec">
    
    <label>테스트 요구사항</label>
    <textarea id="promptInput" placeholder="기능 설명 또는 지라 내용을 입력하세요..."></textarea>
    
    <div class="btn-group">
      <button id="genBtn" onclick="generate()">TC 생성하기</button>
      <button id="sendBtn" onclick="sendToSheet()">🚀 구글 시트로 자동 전송</button>
    </div>
  </div>

  <div id="resultCard" class="card" style="display:none">
    <h3>미리보기</h3>
    <div id="tableOut"></div>
  </div>
</div>

<script>
let currentPayload = null;

// 로컬 스토리지에 API Key와 URL 자동 저장
(function() {
  const k = localStorage.getItem('tc_gemini_key');
  const s = localStorage.getItem('tc_script_url');
  if(k) { document.getElementById('apiKey').value = k; updateDot('geminiDot', k); }
  if(s) { document.getElementById('scriptUrl').value = s; updateDot('scriptDot', s); }
})();

function updateDot(id, val) {
  document.getElementById(id).className = 'status-dot' + (val ? ' ok' : '');
}

document.getElementById('apiKey').addEventListener('input', e => {
  localStorage.setItem('tc_gemini_key', e.target.value);
  updateDot('geminiDot', e.target.value);
});
document.getElementById('scriptUrl').addEventListener('input', e => {
  localStorage.setItem('tc_script_url', e.target.value);
  updateDot('scriptDot', e.target.value);
});

async function generate() {
  const key = document.getElementById('apiKey').value;
  const input = document.getElementById('promptInput').value;
  const btn = document.getElementById('genBtn');

  if(!key || !input) return alert('API Key와 요구사항을 입력하세요.');

  btn.disabled = true;
  btn.textContent = '생성 중...';

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        contents: [{ parts: [{ text: input + "\n\n반드시 JSON 형식으로만 답변: { \"jiraTitle\": \"제목\", \"tcData\": [{ \"tc_id\": \"TC-001\", \"category_large\": \"대분류\", \"category_mid\": \"중분류\", \"category_small\": \"소분류\", \"test_item\": \"항목\", \"precondition\": \"사전조건\", \"test_steps\": \"단계\", \"expected_result\": \"기대결과\" }] }" }]}]
      })
    });

    const data = await res.json();
    const txt = data.candidates[0].content.parts[0].text;
    const match = txt.match(/\{[\s\S]*\}/);
    
    if (match) {
      currentPayload = JSON.parse(match[0]);
      render(currentPayload.tcData);
      document.getElementById('sendBtn').style.display = 'block';
      document.getElementById('resultCard').style.display = 'block';
    }
  } catch (e) {
    alert('오류 발생: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'TC 생성하기';
  }
}

function render(data) {
  let h = '<table><thead><tr><th>ID</th><th>항목</th><th>기대결과</th></tr></thead><tbody>';
  data.forEach(d => h += `<tr><td>${d.tc_id}</td><td>${d.test_item}</td><td>${d.expected_result}</td></tr>`);
  document.getElementById('tableOut').innerHTML = h + '</tbody></table>';
}

// JSONP 통신으로 보안 오류(CORS)를 완벽 우회
function sendToSheet() {
  const url = document.getElementById('scriptUrl').value;
  if(!url) return alert('Apps Script URL을 입력하세요.');
  
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = '시트로 전송 중...';

  const callbackName = 'jsonp_cb_' + Date.now();
  window[callbackName] = function(res) {
    btn.disabled = false;
    btn.textContent = '🚀 구글 시트로 자동 전송';
    if(res.status === 'ok') {
      alert('✅ 전송 완료! 시트 하단에 새로운 탭이 생성되었습니다.');
    } else {
      alert('❌ 오류: ' + res.message);
    }
    delete window[callbackName];
    document.body.removeChild(script);
  };

  const script = document.createElement('script');
  const dataParam = encodeURIComponent(JSON.stringify(currentPayload));
  script.src = `${url}?callback=${callbackName}&data=${dataParam}`;
  document.body.appendChild(script);
}
</script>
</body>
</html>
