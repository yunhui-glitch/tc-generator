<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TC 자동 생성기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#21253a;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--accent:#4f8fff;--accent2:#7c5cfc;--text:#e8eaf0;--text2:#8b90a8;--text3:#555a72;--success:#3ecf8e;--danger:#f43f5e}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
  .h-left{display:flex;align-items:center;gap:12px}
  .h-right{display:flex;gap:12px}
  .container{display:flex;flex:1;overflow:hidden}
  .sidebar{width:400px;border-right:1px solid var(--border);padding:24px;overflow-y:auto;background:var(--surface)}
  .main{flex:1;padding:24px;overflow-y:auto;background:var(--bg)}
  
  .card{background:var(--surface2);border-radius:12px;padding:20px;border:1px solid var(--border);margin-bottom:20px}
  .f-group{margin-bottom:16px}
  .f-label{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px}
  input,textarea,select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;transition:0.2s}
  input:focus,textarea:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px rgba(79,143,255,0.15)}
  textarea{height:280px;resize:none;font-family:inherit}
  
  .btn{padding:10px 16px;border-radius:8px;border:none;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:0.2s;font-size:14px}
  .btn-p{background:linear-gradient(135deg, var(--accent), var(--accent2));color:#fff}
  .btn-p:hover{opacity:0.9;transform:translateY(-1px)}
  .btn-p:disabled{opacity:0.5;cursor:not-allowed;transform:none}
  
  .loading-overlay{position:fixed;inset:0;background:rgba(15,17,23,0.8);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:20px}
  .loading-overlay.show{display:flex}
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:var(--surface2);padding:12px;text-align:left;color:var(--text2);font-weight:600;border:1px solid var(--border)}
  td{padding:12px;border:1px solid var(--border);vertical-align:top;line-height:1.5}
  .pre{white-space:pre-wrap;font-family:inherit}
</style>
</head>
<body>

<header>
  <div class="h-left">
    <div style="font-weight:700;font-size:18px;letter-spacing:-0.5px">TC AUTO GENERATOR</div>
  </div>
  <div id="statusArea" style="font-size:13px;color:var(--text2)">
    상태: <span id="statusText">준비 완료</span>
  </div>
</header>

<div class="container">
  <div class="sidebar">
    <div class="f-group">
      <div class="f-label">Gemini API Key</div>
      <input type="password" id="geminiKey" placeholder="API 키를 입력하세요">
    </div>
    
    <div class="f-group">
        <div class="f-label">모델 선택</div>
        <select id="modelSelect">
            <option value="gemini-1.5-flash">Gemini 1.5 Flash (속도 최적화)</option>
            <option value="gemini-1.5-pro">Gemini 1.5 Pro (정교한 분석)</option>
        </select>
    </div>

    <div class="f-group">
      <div class="f-label">JIRA / Prefix</div>
      <input type="text" id="prefix" placeholder="예: PROJ-01">
    </div>

    <div class="f-group">
      <div class="f-label">기능 시나리오</div>
      <textarea id="scenario" placeholder="요구사항이나 기능 설명을 상세히 입력하세요 (Ctrl+Enter로 생성)"></textarea>
    </div>

    <button id="generateBtn" class="btn btn-p" style="width:100%" onclick="generateTC()">
      테스트 케이스 생성하기
    </button>
  </div>

  <div class="main" id="resultContainer">
    <div id="emptyMsg" style="height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-direction:column;gap:16px">
        <div style="font-size:48px">📝</div>
        <p>시나리오를 입력하고 생성을 시작하세요.</p>
    </div>
    <div id="resultContent" style="display:none">
        <div style="display:flex;justify-content:space-between;margin-bottom:20px;align-items:center">
            <h3 id="resTitle">생성 결과</h3>
            <button class="btn btn-p" onclick="downloadExcel()">엑셀 다운로드</button>
        </div>
        <div id="tableArea"></div>
    </div>
  </div>
</div>

<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div>
  <div id="loadingText" style="font-weight:500">AI 분석 중...</div>
</div>

<script>
let lastResult = [];

// 기존 템플릿 처리 로직 유지 (Base64)
const TEMPLATE_B64 = ""; // 원래 코드의 템플릿 데이터가 있다면 여기에 배치

async function generateTC() {
  const key = document.getElementById('geminiKey').value.trim();
  const scenario = document.getElementById('scenario').value.trim();
  const prefix = document.getElementById('prefix').value || 'TC';
  const model = document.getElementById('modelSelect').value;

  if(!key || !scenario) { alert("API 키와 시나리오를 모두 입력해주세요."); return; }

  localStorage.setItem('gemini_key', key);
  showLoading(true, "시나리오 기반으로 TC를 설계하고 있습니다...");

  // 보완: 프롬프트 세분화
  const prompt = `당신은 QA 전문가입니다. 아래 시나리오를 분석하여 테스트 케이스를 JSON 배열로 생성하세요.
  시나리오: "${scenario}"
  
  필수 규칙:
  1. JSON 형식만 출력할 것: [{"id":"${prefix}-01", "title":"...", "pre_condition":"...", "test_data":"...", "test_steps":"1. ...\\n2. ...", "expected_result":"..."}]
  2. SI 프로젝트 환경에 맞게 구체적인 '사전 조건'과 '테스트 데이터'를 포함할 것.
  3. 최소 5개 이상의 TC를 생성하되, 정상 케이스와 예외 케이스(Edge Case)를 골고루 포함할 것.`;

  try {
    const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });

    const data = await res.json();
    const text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
    lastResult = JSON.parse(text);
    
    renderTable(lastResult);
    document.getElementById('emptyMsg').style.display = 'none';
    document.getElementById('resultContent').style.display = 'block';
    setStatus("생성 완료", true);
  } catch (e) {
    console.error(e);
    alert("생성 실패: " + e.message);
    setStatus("오류 발생", false);
  } finally {
    showLoading(false);
  }
}

async function fetchWithRetry(url, opts, retries = 2) {
  for (let i = 0; i <= retries; i++) {
    const res = await fetch(url, opts);
    if (res.ok) return res;
    if (res.status === 429 && i < retries) {
      await new Promise(r => setTimeout(r, 2000 * (i + 1)));
      continue;
    }
    throw new Error(`HTTP ${res.status}`);
  }
}

function renderTable(data) {
  const area = document.getElementById('tableArea');
  area.innerHTML = `<table>
    <thead><tr><th>ID</th><th>테스트 케이스명</th><th>조건/데이터</th><th>테스트 절차</th><th>예상 결과</th></tr></thead>
    <tbody>${data.map(item => `
      <tr>
        <td>${item.id}</td>
        <td><b>${item.title}</b></td>
        <td class="pre"><small style="color:var(--text2)">[조건]</small><br>${item.pre_condition}<br><small style="color:var(--text2)">[데이터]</small><br>${item.test_data}</td>
        <td class="pre">${item.test_steps}</td>
        <td class="pre">${item.expected_result}</td>
      </tr>`).join('')}</tbody></table>`;
}

async function downloadExcel() {
  const workbook = new ExcelJS.Workbook();
  const ws = workbook.addWorksheet('TestCases');
  ws.columns = [
    {header:'ID', key:'id', width:12}, {header:'명칭', key:'title', width:30},
    {header:'사전조건', key:'pre', width:25}, {header:'데이터', key:'data', width:20},
    {header:'절차', key:'steps', width:40}, {header:'결과', key:'exp', width:40}
  ];
  lastResult.forEach(v => ws.addRow({
    id:v.id, title:v.title, pre:v.pre_condition, data:v.test_data, steps:v.test_steps, exp:v.expected_result
  }));
  ws.eachRow(r => r.alignment = {vertical:'top', wrapText:true});
  
  const buf = await workbook.xlsx.writeBuffer();
  const blob = new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `TC_${new Date().getTime()}.xlsx`; a.click();
}

function showLoading(show, msg) {
  document.getElementById('loadingOverlay').className = 'loading-overlay' + (show ? ' show' : '');
  if (msg) document.getElementById('loadingText').textContent = msg;
}

function setStatus(msg, ok) {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('statusText').style.color = ok ? 'var(--success)' : 'var(--danger)';
}

document.addEventListener('keydown', e => { if(e.ctrlKey && e.key === 'Enter') generateTC(); });

(function(){
  const saved = localStorage.getItem('gemini_key');
  if(saved) document.getElementById('geminiKey').value = saved;
})();
</script>
</body>
</html>
