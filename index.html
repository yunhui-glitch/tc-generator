<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TC 자동 생성기</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#21253a;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--accent:#4f8fff;--accent2:#7c5cfc;--text:#e8eaf0;--text2:#8b90a8;--text3:#555a72;--success:#3ecf8e;--danger:#f43f5e}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
  .logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;white-space:nowrap}
  .logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
  .key-pill{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text2);white-space:nowrap}
  .key-pill input{background:none;border:none;outline:none;color:var(--text);font-size:12px;font-family:'JetBrains Mono',monospace;width:210px}
  .key-pill input::placeholder{color:var(--text3)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
  .dot.ok{background:var(--success)}.dot.err{background:var(--danger)}
  .workspace{flex:1;display:flex;overflow:hidden;height:calc(100vh - 52px);position:relative}
  .input-panel{width:300px;min-width:300px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.25rem;gap:10px;overflow-y:auto}
  .panel-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
  label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
  textarea,input[type=text],select{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;font-family:'Pretendard',sans-serif;outline:none;transition:border-color .2s}
  textarea:focus,input[type=text]:focus,select:focus{border-color:var(--accent)}
  textarea{resize:none;height:200px;line-height:1.65}
  select option{background:var(--surface2)}
  .form-row{display:flex;gap:8px}.form-row .fg{flex:1}
  .divider{border:none;border-top:1px solid var(--border);margin:4px 0}
  .btn-generate{width:100%;padding:10px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:13px;font-weight:600;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s,transform .1s;font-family:'Pretendard',sans-serif}
  .btn-generate:hover{opacity:.9}.btn-generate:active{transform:scale(.98)}.btn-generate:disabled{opacity:.4;cursor:not-allowed}
  .tip-box{background:rgba(79,143,255,.07);border:1px solid rgba(79,143,255,.2);border-radius:8px;padding:10px 12px;font-size:11.5px;color:var(--text2);line-height:1.7}
  .tip-box strong{color:var(--accent);font-weight:500}.tip-box a{color:var(--accent)}
  .result-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .result-bar{padding:.85rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0;gap:8px}
  .result-meta{font-size:13px;color:var(--text2)}.result-meta strong{color:var(--text);font-weight:500}
  .btn-group{display:flex;gap:8px;flex-shrink:0}
  .btn-sm{padding:6px 14px;border-radius:7px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;font-family:'Pretendard',sans-serif;white-space:nowrap}
  .btn-sm:hover{background:rgba(255,255,255,.06)}.btn-sm:disabled{opacity:.3;cursor:not-allowed}
  .btn-sm.green{background:rgba(62,207,142,.12);border-color:rgba(62,207,142,.35);color:var(--success)}
  .btn-sm.purple{background:rgba(124,92,252,.12);border-color:rgba(124,92,252,.35);color:#a78bfa}
  .btn-sm.green:hover{background:rgba(62,207,142,.2)}
  .table-wrap{flex:1;overflow:auto}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{position:sticky;top:0;z-index:2;background:#1e2235;color:var(--text2);font-weight:500;padding:9px 12px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border2);font-size:10px;text-transform:uppercase;letter-spacing:.05em}
  td{padding:9px 12px;vertical-align:top;border-bottom:1px solid var(--border);color:var(--text);line-height:1.6}
  tr:nth-child(even) td{background:rgba(255,255,255,.02)}
  tr:hover td{background:rgba(79,143,255,.05)}
  .tc-id{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);white-space:nowrap;font-weight:500}
  .tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;background:var(--surface2);color:var(--text2);border:1px solid var(--border2)}
  .pre{white-space:pre-line;font-size:11px;color:var(--text2)}
  .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3);padding:3rem}
  .empty-state p{font-size:13px;text-align:center;line-height:1.7}
  .loading-overlay{display:none;position:absolute;inset:0;background:rgba(15,17,23,.88);z-index:10;flex-direction:column;align-items:center;justify-content:center;gap:16px}
  .loading-overlay.show{display:flex}
  .spinner{width:34px;height:34px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:13px;color:var(--text2)}
  .btn-cancel{padding:7px 20px;border-radius:7px;border:1px solid rgba(244,63,94,.4);background:rgba(244,63,94,.12);color:var(--danger);font-size:12px;font-weight:500;cursor:pointer;font-family:'Pretendard',sans-serif;transition:background .15s}
  .btn-cancel:hover{background:rgba(244,63,94,.22)}
  .status-bar{padding:7px 1.25rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;font-size:11px;color:var(--text3);background:var(--surface);flex-shrink:0}
  .sdot{width:6px;height:6px;border-radius:50%;background:var(--text3)}.sdot.ok{background:var(--success)}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:12px 18px;font-size:13px;color:var(--text);display:none;align-items:center;gap:10px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.4)}
  .toast.show{display:flex;animation:slideUp .2s ease}
  .toast.success{border-color:rgba(62,207,142,.35)}.toast.error{border-color:rgba(244,63,94,.35)}
  @keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
  .thinking-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(124,92,252,.15);color:#a78bfa;border:1px solid rgba(124,92,252,.3);margin-left:6px}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-icon">🧪</div>TC 자동 생성기</div>
  <div style="display:flex;gap:8px;align-items:center">
    <div class="key-pill">
      <div class="dot" id="geminiDot"></div>
      <input type="password" id="geminiKey" placeholder="Gemini API Key (AIza...)" />
    </div>
  </div>
</header>

<div class="workspace">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">처리 중...</div>
    <button class="btn-cancel" onclick="cancelGenerate()">✕ 취소</button>
  </div>

  <div class="input-panel">
    <div class="panel-title">시나리오 입력</div>
    <div>
      <label>기능 시나리오</label>
      <textarea id="scenario" placeholder="기능명, 조건, 예외 케이스 등을 입력하세요.&#10;&#10;Ctrl+Enter 로 바로 생성"></textarea>
    </div>
    <div>
      <label>JIRA / 기능명</label>
      <input type="text" id="jiraTitle" placeholder="예: [BPM-52765][미니EPG 노출 보완]" />
    </div>
    <div class="form-row">
      <div class="fg"><label>TC ID 접두사</label><input type="text" id="tcPrefix" value="TC-001" /></div>
      <div class="fg"><label>대분류</label><input type="text" id="category" value="EPG" /></div>
    </div>
    <div>
      <label>시트 탭 이름</label>
      <input type="text" id="sheetName" placeholder="예: TC_EPG_20250511 (미입력 시 자동)" />
    </div>
    <div>
      <label>
        Gemini 모델
        <span class="thinking-badge" id="thinkingBadge" style="display:none">💡 thinking</span>
      </label>
      <select id="modelSelect" onchange="onModelChange()">
        <option value="gemini-2.5-flash">gemini-2.5-flash — 무료 · 10 RPM · 추천</option>
        <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite — 무료 · 15 RPM · 가장 빠름</option>
        <option value="gemini-2.5-pro">gemini-2.5-pro — 무료 · 5 RPM · 정확도↑</option>
      </select>
      <div id="modelDesc" style="margin-top:5px;font-size:11px;color:var(--text3);line-height:1.5"></div>
    </div>
    <button class="btn-generate" id="generateBtn" onclick="generateTC()">✨ TC 초안 생성</button>
    <hr class="divider">
    <div class="tip-box">
      <strong>📌 사용 방법</strong><br>
      1. <a href="https://aistudio.google.com/app/apikey" target="_blank">Gemini API 키 무료 발급</a><br>
      2. 시나리오 입력 → TC 생성<br>
      3. 📋 내용 복사 또는 📊 구글 시트에 추가<br><br>
      <strong>⌨ 단축키</strong><br>
      Ctrl+Enter — TC 생성
    </div>
  </div>

  <div class="result-panel">
    <div class="result-bar">
      <div class="result-meta" id="resultMeta">시나리오를 입력하고 생성 버튼을 눌러주세요</div>
      <div class="btn-group">
        <button class="btn-sm purple" id="copyBtn" onclick="copyToClipboard()" disabled>📋 내용 복사</button>
        <button class="btn-sm green" id="sheetsBtn" onclick="uploadToSheets()" disabled>📊 구글 시트에 추가</button>
      </div>
    </div>
    <div id="tableContainer">
      <div class="empty-state">
        <div style="font-size:40px;opacity:.3">📋</div>
        <p>시나리오를 입력하면<br>TC 초안이 여기에 표시됩니다</p>
      </div>
    </div>
    <div class="status-bar">
      <div class="sdot" id="sdot"></div>
      <span id="statusText">대기 중</span>
      <span style="margin-left:auto;color:var(--text3)" id="modelLabel"></span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let tcData = [];
let currentAbortController = null;

const MODEL_CONFIG = {
  'gemini-2.5-flash': {
    desc: '✅ 무료 · 10 RPM / 500 RPD · 속도·품질 균형 — TC 생성 기본 추천',
    thinking: false,
    jsonMode: true,
    generationConfig: {
      temperature: 0.3,
      maxOutputTokens: 8192,
      thinkingConfig: { thinkingBudget: 0 },
      response_mime_type: 'application/json'
    }
  },
  'gemini-2.5-flash-lite': {
    desc: '✅ 무료 · 15 RPM / 1,000 RPD · 하루 한도가 가장 넉넉 — 반복 생성에 유리',
    thinking: false,
    jsonMode: true,
    generationConfig: {
      temperature: 0.3,
      maxOutputTokens: 8192,
      thinkingConfig: { thinkingBudget: 0 },
      response_mime_type: 'application/json'
    }
  },
  'gemini-2.5-pro': {
    desc: '✅ 무료 · 5 RPM / 100 RPD · Thinking 활성 — 복잡한 시나리오에 정확도↑',
    thinking: true,
    jsonMode: false,
    generationConfig: {
      temperature: 0.3,
      maxOutputTokens: 16384,
      thinkingConfig: { thinkingBudget: -1 }
    }
  }
};

function onModelChange() {
  const model = document.getElementById('modelSelect').value;
  const cfg = MODEL_CONFIG[model];
  document.getElementById('modelDesc').textContent = cfg.desc;
  document.getElementById('thinkingBadge').style.display = cfg.thinking ? 'inline-flex' : 'none';
}
onModelChange();

const SYSTEM_PROMPT = `당신은 10년 차 이상의 시니어 QA 엔지니어이자 테스트 설계 전문가입니다.
제공된 시나리오를 바탕으로 실무에서 즉시 사용 가능한 수준의 상세 테스트 케이스를 설계하십시오.

**지시 사항:**
1. **형식:** 반드시 순수 JSON 배열만 출력하십시오. 마크다운 코드블록이나 설명은 생략합니다.
2. **범위:** 정상 케이스뿐만 아니라 경계값, 예외/비정상 상황(Edge Case)을 반드시 포함하십시오.
3. **구체성:** 'test_steps'는 수행 순서에 따라 번호를 매겨 구체적으로 기술하십시오.
   'expected_result'는 검증 가능한 기대 반응을 명확히 서술하십시오.
4. **일관성:** tc_id는 요청한 접두사 기준 순번을 부여하고, jira 필드는 빈 문자열("")로 유지하십시오.

**출력 스키마:**
[
  {
    "tc_id": "TC-001",
    "jira": "",
    "category_large": "대분류",
    "category_mid": "중분류",
    "category_small": "소분류",
    "test_item": "시험 항목",
    "precondition": "전제조건 및 입력 데이터",
    "test_steps": "1. 단계1\\n2. 단계2",
    "expected_result": "1. 기대결과1\\n2. 기대결과2"
  }
]`;

async function generateTC() {
  const apiKey   = document.getElementById('geminiKey').value.trim();
  const scenario = document.getElementById('scenario').value.trim();
  const prefix   = document.getElementById('tcPrefix').value.trim() || 'TC-001';
  const category = document.getElementById('category').value.trim() || '';
  const model    = document.getElementById('modelSelect').value;

  if (!apiKey)   { showToast('❗ Gemini API 키를 입력해주세요', 'error'); return; }
  if (!scenario) { showToast('❗ 시나리오를 입력해주세요', 'error'); return; }

  if (!document.getElementById('sheetName').value) {
    const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
    document.getElementById('sheetName').value = `TC_${category}_${today}`;
  }

  if (currentAbortController) currentAbortController.abort();
  currentAbortController = new AbortController();
  const signal = currentAbortController.signal;

  showLoading(true, 'Gemini가 TC를 생성하는 중...');
  setStatus('생성 중...', false);

  try {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
    const modelCfg = MODEL_CONFIG[model] || MODEL_CONFIG['gemini-2.5-flash'];

    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal,
      body: JSON.stringify({
        system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
        contents: [{ parts: [{ text: `TC ID 접두사: ${prefix}\n대분류: ${category}\n\n=== 시나리오 ===\n${scenario}` }] }],
        generationConfig: modelCfg.generationConfig
      })
    });

    if (!res.ok) {
      const err = await res.json();
      const msg = err.error?.message || `HTTP ${res.status}`;
      if (res.status === 400) throw new Error(`요청 오류: ${msg}`);
      if (res.status === 403 || res.status === 401) throw new Error(`API 키 오류: 키를 확인해주세요`);
      if (res.status === 429) throw new Error(`요청 한도 초과: 잠시 후 다시 시도해주세요`);
      throw new Error(msg);
    }

    const data = await res.json();
    const parts = data.candidates?.[0]?.content?.parts || [];
    const raw = parts.filter(p => p.text && !p.thought).map(p => p.text).join('');

    let parsed = null;
    if (modelCfg.jsonMode) {
      try { parsed = JSON.parse(raw); } catch(e) {
        throw new Error('데이터 파싱 실패. 시나리오를 더 구체적으로 입력해보세요.');
      }
    } else {
      const cleaned = raw.replace(/```json|```/g, '').trim();
      const matches = [...cleaned.matchAll(/\[[\s\S]*?\]/g)];
      for (const m of matches) {
        try { const arr = JSON.parse(m[0]); if (Array.isArray(arr) && arr.length > 0 && arr[0].tc_id) { parsed = arr; break; } } catch(e) {}
      }
      if (!parsed) { const gm = cleaned.match(/\[[\s\S]*\]/); if (gm) { try { parsed = JSON.parse(gm[0]); } catch(e) {} } }
      if (!parsed || !parsed.length) throw new Error('TC 파싱 실패. 시나리오를 더 구체적으로 입력해보세요.');
    }

    tcData = parsed.map(tc => ({ ...tc, jira: '' }));
    renderTable(tcData);
    document.getElementById('resultMeta').innerHTML = `<strong>${tcData.length}개 TC</strong> 생성 완료 &nbsp;·&nbsp; ${new Date().toLocaleTimeString('ko-KR')}`;
    document.getElementById('copyBtn').disabled = false;
    document.getElementById('sheetsBtn').disabled = false;
    document.getElementById('geminiDot').className = 'dot ok';
    document.getElementById('modelLabel').textContent = model + (modelCfg.thinking ? ' (thinking)' : '');
    setStatus(`${tcData.length}개 TC 생성 완료`, true);
    showToast(`✅ TC ${tcData.length}개 생성 완료!`, 'success');

  } catch(e) {
    if (e.name === 'AbortError') {
      setStatus('생성 취소됨', false);
      showToast('⛔ 생성이 취소되었습니다', '');
      return;
    }
    showToast('❌ ' + e.message, 'error');
    setStatus('오류: ' + e.message, false);
  } finally {
    showLoading(false);
    currentAbortController = null;
  }
}

function cancelGenerate() {
  if (currentAbortController) currentAbortController.abort();
}

async function copyToClipboard() {
  if (!tcData.length) return;
  const rows = tcData.map(tc => [
    tc.tc_id||'', tc.jira||'', tc.category_large||'', tc.category_mid||'',
    tc.category_small||'', tc.test_item||'', tc.precondition||'',
    tc.test_steps||'', tc.expected_result||''
  ].map(v => {
    const clean = v.replace(/\t/g, ' ');
    return clean.includes('\n') ? `"${clean.replace(/"/g, '""')}"` : clean;
  }).join('\t'));
  const tsv = rows.join('\n');
  try {
    await navigator.clipboard.writeText(tsv);
    showToast('📋 복사 완료! 구글 시트에서 원하는 셀 클릭 후 Ctrl+V 하세요.', 'success');
  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = tsv; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('📋 복사 완료! 구글 시트에서 Ctrl+V 하세요.', 'success');
  }
}

async function uploadToSheets() {
  const scriptUrl = 'https://script.google.com/macros/s/AKfycbwjSjXl19hie1nEHvYaaM6u1WcaVge388prNlMD1U1BEeSbSwDw4UyjY0IZZxY_vTuM/exec';
  const sheetName = document.getElementById('sheetName').value.trim();
  const jiraTitle = document.getElementById('jiraTitle').value.trim();
  if (!tcData.length) { showToast('❗ 먼저 TC를 생성해주세요', 'error'); return; }

  showLoading(true, '구글 시트에 업로드 중...');
  setStatus('업로드 중...', false);

  try {
    const payload = {
      sheetName: sheetName || `TC_${new Date().toISOString().slice(0,10).replace(/-/g,'')}`,
      jiraTitle,
      tcData
    };
    // Apps Script는 no-cors로 호출 — 응답 확인 불가, 성공으로 간주
    await fetch(scriptUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    const finalSheetName = payload.sheetName;
    setStatus(`구글 시트 업로드 완료 — "${finalSheetName}" 탭`, true);
    showToast(`📊 "${finalSheetName}" 탭으로 업로드 완료! 시트에서 확인해주세요.`, 'success');
  } catch(e) {
    showToast('❌ ' + e.message, 'error');
    setStatus('업로드 오류: ' + e.message, false);
  } finally {
    showLoading(false);
  }
}

function renderTable(data) {
  document.getElementById('tableContainer').innerHTML=`<div class="table-wrap"><table>
    <thead><tr><th>TC ID</th><th>JIRA</th><th>대분류</th><th>중분류</th><th>소분류</th><th>시험 항목</th><th>Pre-Condition</th><th>시험 절차</th><th>주요 점검 항목</th></tr></thead>
    <tbody>${data.map(tc=>`<tr>
      <td><span class="tc-id">${e(tc.tc_id)}</span></td>
      <td style="font-size:11px;color:var(--accent)">${e(tc.jira)}</td>
      <td><span class="tag">${e(tc.category_large)}</span></td>
      <td><span class="tag">${e(tc.category_mid)}</span></td>
      <td><span class="tag">${e(tc.category_small)}</span></td>
      <td style="min-width:130px">${e(tc.test_item)}</td>
      <td style="min-width:130px"><span class="pre">${e(tc.precondition)}</span></td>
      <td style="min-width:180px"><span class="pre">${e(tc.test_steps)}</span></td>
      <td style="min-width:140px"><span class="pre">${e(tc.expected_result)}</span></td>
    </tr>`).join('')}</tbody></table></div>`;
}

function e(s){
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;')
    .replace(/\n/g,'<br>');
}
function showLoading(show,msg){
  document.getElementById('loadingOverlay').className='loading-overlay'+(show?' show':'');
  if(msg) document.getElementById('loadingText').textContent=msg;
  document.getElementById('generateBtn').disabled=show;
}
function setStatus(msg,ok){document.getElementById('statusText').textContent=msg;document.getElementById('sdot').className='sdot'+(ok?' ok':'');}
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;clearTimeout(t._t);t._t=setTimeout(()=>t.className='toast',4000);}
document.addEventListener('keydown',ev=>{if(ev.ctrlKey&&ev.key==='Enter')generateTC();});

(function(){
  const savedKey = sessionStorage.getItem('gemini_key');
  if(savedKey){ document.getElementById('geminiKey').value=savedKey; document.getElementById('geminiDot').className='dot ok'; }
})();

document.getElementById('geminiKey').addEventListener('input',ev=>{
  document.getElementById('geminiDot').className='dot'+(ev.target.value.startsWith('AIza')?' ok':'');
  sessionStorage.setItem('gemini_key', ev.target.value);
});
</script>
