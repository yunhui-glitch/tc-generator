<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TC 자동 생성기 Pro - QA Assistant</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #21253a;
    --border: rgba(255,255,255,0.08); --accent: #4f8fff;
    --text: #e8eaf0; --text2: #8b90a8; --success: #3ecf8e; --danger: #f43f5e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
  
  /* Layout */
  .container { display: grid; grid-template-columns: 400px 1fr; height: 100vh; overflow: hidden; }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; }
  .main-content { padding: 20px; overflow-y: auto; background: var(--bg); }

  /* Forms */
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
  input, textarea, select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); padding: 10px; font-size: 14px;
    transition: all 0.2s;
  }
  input:focus, textarea:focus { border-color: var(--accent); outline: none; }
  textarea { height: 250px; resize: none; font-family: inherit; }

  /* Buttons */
  .btn {
    width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: 600;
    cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { background: var(--surface2); color: var(--text3); cursor: not-allowed; transform: none; }

  /* Results Table */
  .res-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
  .res-table th { background: var(--surface2); padding: 12px; text-align: left; border: 1px solid var(--border); color: var(--text2); }
  .res-table td { padding: 12px; border: 1px solid var(--border); vertical-align: top; }
  .pre-wrap { white-space: pre-wrap; word-break: break-all; }

  /* Overlay */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
  }
  .overlay.show { display: flex; }
  .loader { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h2 style="margin-bottom:20px; font-size:18px;">TC Generator Pro</h2>
    
    <div class="field">
      <label>Gemini API Key</label>
      <input type="password" id="apiKey" placeholder="AIZA...">
    </div>

    <div class="field">
      <label>프로젝트 정보 (JIRA/Prefix)</label>
      <input type="text" id="prefix" placeholder="EX) PROJ-01">
    </div>

    <div class="field">
      <label>기능 시나리오 (상세할수록 정확함)</label>
      <textarea id="scenario" placeholder="여기에 기능을 설명하거나 요구사항을 입력하세요..."></textarea>
    </div>

    <button id="genBtn" class="btn btn-primary" onclick="generateTC()">
      <span>테스트 케이스 생성</span>
    </button>
    
    <div id="status" style="margin-top:15px; font-size:12px; color:var(--text2);"></div>
  </div>

  <div class="main-content">
    <div id="resultActions" style="display:none; margin-bottom:15px; gap:10px;">
        <button class="btn" style="width:auto; background:var(--surface2);" onclick="downloadExcel()">엑셀 다운로드</button>
    </div>
    <div id="resultArea">
      <p style="color:var(--text3); text-align:center; margin-top:100px;">시나리오를 입력하고 생성을 시작하세요.</p>
    </div>
  </div>
</div>

<div id="loading" class="overlay">
  <div class="loader"></div>
  <p id="loadingMsg" style="margin-top:15px;"></p>
</div>

<script>
let generatedData = [];

async function generateTC() {
  const key = document.getElementById('apiKey').value;
  const scenario = document.getElementById('scenario').value;
  const prefix = document.getElementById('prefix').value || 'TC';

  if(!key || !scenario) {
    alert("API 키와 시나리오를 입력해주세요.");
    return;
  }

  // 로컬 스토리지 저장
  localStorage.setItem('saved_gemini_key', key);
  
  toggleLoading(true, "AI가 시나리오를 분석하고 TC를 설계 중입니다...");

  const prompt = `
    당신은 전문 QA 엔지니어입니다. 다음 시나리오를 바탕으로 시스템 통합 테스트(SI) 수준의 테스트 케이스를 작성하세요.
    
    시나리오: "${scenario}"
    규칙:
    1. 결과는 반드시 JSON 배열 형태로만 출력하세요. 다른 설명은 제외하세요.
    2. 필드명: id, title, pre_condition, test_data, test_steps, expected_result
    3. 각 TC의 ID는 "${prefix}-"로 시작해야 합니다.
    4. Edge Case(예외 상황)와 데이터 유효성 검증을 포함하여 최소 5개 이상 생성하세요.
    5. test_steps는 줄바꿈을 포함하여 단계별로 작성하세요.
  `;

  try {
    const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });

    const data = await response.json();
    const rawText = data.candidates[0].content.parts[0].text;
    
    // JSON 파싱 (코드 블럭 제거 로직 포함)
    const jsonStr = rawText.replace(/```json|```/g, "").trim();
    generatedData = JSON.parse(jsonStr);
    
    renderTable(generatedData);
    document.getElementById('resultActions').style.display = 'flex';
  } catch (err) {
    console.error(err);
    alert("생성 중 오류가 발생했습니다: " + err.message);
  } finally {
    toggleLoading(false);
  }
}

async function fetchWithRetry(url, options, retries = 3) {
  for (let i = 0; i < retries; i++) {
    try {
      const res = await fetch(url, options);
      if (res.ok) return res;
      if (res.status === 429) {
        document.getElementById('loadingMsg').textContent = `과부하로 재시도 중... (${i+1}/${retries})`;
        await new Promise(r => setTimeout(r, 2000 * (i + 1)));
      }
    } catch (e) {
      if (i === retries - 1) throw e;
    }
  }
  throw new Error("최대 재시도 횟수를 초과했습니다.");
}

function renderTable(data) {
  let html = `
    <table class="res-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>테스트 케이스명</th>
          <th>사전 조건 / 데이터</th>
          <th>테스트 절차</th>
          <th>예상 결과</th>
        </tr>
      </thead>
      <tbody>
        ${data.map(item => `
          <tr>
            <td>${item.id}</td>
            <td class="pre-wrap"><b>${item.title}</b></td>
            <td class="pre-wrap"><small>조건:</small> ${item.pre_condition}<br><small>데이터:</small> ${item.test_data}</td>
            <td class="pre-wrap">${item.test_steps}</td>
            <td class="pre-wrap">${item.expected_result}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
  document.getElementById('resultArea').innerHTML = html;
}

async function downloadExcel() {
  const workbook = new ExcelJS.Workbook();
  const worksheet = workbook.addWorksheet('TestCases');

  worksheet.columns = [
    { header: 'ID', key: 'id', width: 15 },
    { header: 'Title', key: 'title', width: 30 },
    { header: 'Pre-condition', key: 'pre', width: 25 },
    { header: 'Test Data', key: 'data', width: 20 },
    { header: 'Steps', key: 'steps', width: 40 },
    { header: 'Expected Result', key: 'expected', width: 40 }
  ];

  generatedData.forEach(d => {
    worksheet.addRow({
      id: d.id, title: d.title, pre: d.pre_condition,
      data: d.test_data, steps: d.test_steps, expected: d.expected_result
    });
  });

  // 스타일 적용
  worksheet.getRow(1).font = { bold: true };
  worksheet.eachRow(row => { row.alignment = { vertical: 'top', wrapText: true }; });

  const buffer = await workbook.xlsx.writeBuffer();
  const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `TC_Export_${new Date().getTime()}.xlsx`;
  a.click();
}

function toggleLoading(show, msg = "") {
  const loader = document.getElementById('loading');
  loader.className = show ? 'overlay show' : 'overlay';
  document.getElementById('loadingMsg').textContent = msg;
}

// 초기화: 저장된 키 불러오기
window.onload = () => {
  const saved = localStorage.getItem('saved_gemini_key');
  if(saved) document.getElementById('apiKey').value = saved;
};
</script>
</body>
</html>
