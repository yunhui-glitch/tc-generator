<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TC 자동 생성기 (엑셀 복사 최적화)</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--border:rgba(255,255,255,0.08);--accent:#4f8fff;--text:#e8eaf0;--text2:#8b90a8;--success:#3ecf8e}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);padding:20px;line-height:1.6}
  .container{max-width:1100px;margin:0 auto}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}
  header{text-align:center;margin-bottom:30px}
  label{display:block;font-size:14px;color:var(--text2);margin-bottom:8px}
  input,textarea{width:100%;background:#0a0c10;border:1px solid var(--border);border-radius:8px;padding:12px;color:#fff;margin-bottom:15px}
  textarea{height:160px;resize:vertical}
  .btn-group{display:flex;gap:10px}
  button{flex:1;padding:15px;border-radius:8px;border:none;cursor:pointer;font-weight:600;transition:0.2s}
  #genBtn{background:var(--accent);color:#fff}
  #copyBtn{background:var(--success);color:#fff;display:none}
  table{width:100%;border-collapse:collapse;margin-top:20px;font-size:12px}
  th,td{border:1px solid var(--border);padding:10px;text-align:left}
  th{background:rgba(255,255,255,0.05)}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>TC 자동 생성기</h1>
    <p style="color:var(--text2)">Failed to fetch 오류 없이 엑셀로 바로 복사하세요.</p>
  </header>

  <div class="card">
    <label>Gemini API Key</label>
    <input type="password" id="apiKey" placeholder="AIza... 입력">
    
    <label>테스트할 기능 설명</label>
    <textarea id="promptInput" placeholder="예: 로그인 페이지 유효성 검사 등"></textarea>
    
    <div class="btn-group">
      <button id="genBtn" onclick="generate()">TC 생성하기</button>
      <button id="copyBtn" onclick="copyExcel()">📋 엑셀용으로 복사하기</button>
    </div>
  </div>

  <div id="resultCard" class="card" style="display:none">
    <h3>미리보기 (상단 버튼을 눌러 복사하세요)</h3>
    <div id="tableOut"></div>
  </div>
</div>

<script>
let tcData = [];

async function generate() {
  const key = document.getElementById('apiKey').value;
  const input = document.getElementById('promptInput').value;
  const btn = document.getElementById('genBtn');

  if(!key || !input) return alert('모든 항목을 입력해주세요.');

  btn.disabled = true;
  btn.textContent = 'AI 분석 중...';

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        contents: [{ parts: [{ text: input + "\n\nJSON 배열 형식으로 출력: [{tc_id, jira, category_large, category_mid, category_small, test_item, precondition, test_steps, expected_result}]" }]}]
      })
    });

    const data = await res.json();
    const txt = data.candidates[0].content.parts[0].text;
    const match = txt.match(/\[[\s\S]*\]/);
    
    if (match) {
      tcData = JSON.parse(match[0]);
      render(tcData);
      document.getElementById('copyBtn').style.display = 'block';
      document.getElementById('resultCard').style.display = 'block';
    }
  } catch (e) {
    alert('오류가 발생했습니다. API 키를 확인해주세요.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'TC 생성하기';
  }
}

function render(data) {
  let h = '<table><thead><tr><th>ID</th><th>테스트 항목</th><th>기대 결과</th></tr></thead><tbody>';
  data.forEach(d => {
    h += `<tr><td>${d.tc_id}</td><td>${d.test_item}</td><td>${d.expected_result}</td></tr>`;
  });
  document.getElementById('tableOut').innerHTML = h + '</tbody></table>';
}

function copyExcel() {
  if (tcData.length === 0) return;

  const head = "ID\tJira\t대분류\t중분류\t소분류\t테스트 항목\t사전 조건\t테스트 단계\t기대 결과\n";
  const body = tcData.map(t => {
    return [
      t.tc_id, t.jira, t.category_large, t.category_mid, t.category_small,
      t.test_item, t.precondition, t.test_steps, t.expected_result
    ].map(v => `"${(v || '').toString().replace(/"/g, '""')}"`).join('\t');
  }).join('\n');

  const el = document.createElement("textarea");
  el.value = head + body;
  document.body.appendChild(el);
  el.select();
  document.execCommand('copy');
  document.body.removeChild(el);

  alert('✅ 복사 완료! 엑셀이나 구글 시트에 Ctrl+V 하세요.');
}
</script>
</body>
</html>
