<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TC 자동 생성기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1117;--surface:#1a1d27;--surface2:#21253a;
    --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
    --accent:#4f8fff;--accent2:#7c5cfc;
    --text:#e8eaf0;--text2:#8b90a8;--text3:#555a72;
    --success:#3ecf8e;--danger:#f43f5e;--warning:#f59e0b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

  /* ── Header ── */
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
  .logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;white-space:nowrap}
  .logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
  .key-pill{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text2);white-space:nowrap;flex-shrink:0}
  .key-pill input{background:none;border:none;outline:none;color:var(--text);font-size:12px;font-family:'JetBrains Mono',monospace;width:220px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
  .dot.ok{background:var(--success)}.dot.err{background:var(--danger)}.dot.checking{background:var(--warning);animation:pulse .8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* ── Layout ── */
  .workspace{flex:1;display:flex;overflow:hidden;height:calc(100vh - 52px);position:relative}
  .input-panel{width:310px;min-width:310px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.25rem;gap:10px;overflow-y:auto}
  .panel-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
  label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
  textarea,input[type=text],input[type=number],select{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s;font-family:'Pretendard',sans-serif}
  textarea:focus,input[type=text]:focus,input[type=number]:focus,select:focus{border-color:var(--accent)}
  textarea{resize:none;height:190px;line-height:1.65}
  .row2{display:flex;gap:8px}
  .row2>div{flex:1}
  .btn-generate{width:100%;padding:10px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:13px;font-weight:600;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s,transform .1s}
  .btn-generate:hover:not(:disabled){opacity:.88;transform:translateY(-1px)}
  .btn-generate:disabled{opacity:.4;cursor:not-allowed;transform:none}

  /* ── Result Panel ── */
  .result-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .result-bar{padding:.85rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0;gap:8px;flex-wrap:wrap}
  .result-meta{font-size:13px;color:var(--text2)}
  .btn-group{display:flex;gap:8px;flex-wrap:wrap}
  .btn-sm{padding:6px 14px;border-radius:7px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s,opacity .15s;white-space:nowrap}
  .btn-sm:hover:not(:disabled){opacity:.8}
  .btn-sm:disabled{opacity:.35;cursor:not-allowed}
  .btn-sm.blue{background:rgba(79,143,255,.15);border-color:rgba(79,143,255,.4);color:var(--accent)}
  .btn-sm.green{background:rgba(62,207,142,.12);border-color:rgba(62,207,142,.35);color:var(--success)}
  .btn-sm.purple{background:rgba(124,92,252,.12);border-color:rgba(124,92,252,.35);color:#a78bfa}

  /* ── Table ── */
  .table-wrap{flex:1;overflow:auto}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{position:sticky;top:0;z-index:2;background:#1e2235;color:var(--text2);padding:9px 12px;text-align:left;border-bottom:1px solid var(--border2);white-space:nowrap}
  td{padding:9px 12px;vertical-align:top;border-bottom:1px solid var(--border);color:var(--text);line-height:1.6}
  td.tc-id{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);white-space:nowrap}
  .pre{white-space:pre-line;font-size:11px;color:var(--text2)}
  .tc-actions{display:flex;gap:6px;white-space:nowrap}
  .tc-btn{background:none;border:1px solid var(--border2);border-radius:5px;color:var(--text2);font-size:11px;padding:3px 8px;cursor:pointer;transition:all .15s}
  .tc-btn:hover{background:var(--surface2);color:var(--text)}
  .tc-btn.danger:hover{border-color:var(--danger);color:var(--danger)}
  [contenteditable="true"]{outline:1px solid var(--accent);border-radius:4px;padding:2px 4px;min-width:20px;background:rgba(79,143,255,.07)}

  /* ── Loading ── */
  .loading-overlay{display:none;position:absolute;inset:0;background:rgba(15,17,23,.88);z-index:10;flex-direction:column;align-items:center;justify-content:center;gap:16px}
  .loading-overlay.show{display:flex}
  .spinner{width:34px;height:34px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:13px;color:var(--text2);max-width:280px;text-align:center;line-height:1.6}

  /* ── Toast ── */
  .toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:12px 18px;font-size:13px;color:var(--text);display:none;align-items:center;gap:10px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.4);max-width:320px}
  .toast.show{display:flex}
  .toast.success{border-color:rgba(62,207,142,.4);background:rgba(62,207,142,.08)}
  .toast.error{border-color:rgba(244,63,94,.4);background:rgba(244,63,94,.08)}

  /* ── Empty state ── */
  .empty-state{padding:100px 40px;text-align:center;opacity:.5}
  .empty-state .icon{font-size:40px;margin-bottom:12px}
  .empty-state p{font-size:13px;color:var(--text2)}

  /* ── Sheets modal ── */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
  .modal-bg.show{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:1.5rem;width:420px;max-width:90vw}
  .modal h3{font-size:15px;font-weight:600;margin-bottom:1rem}
  .modal label{margin-bottom:4px;margin-top:10px}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
  .btn-modal{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text);transition:opacity .15s}
  .btn-modal.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff}
  .btn-modal:hover{opacity:.8}
  .hint{font-size:11px;color:var(--text3);margin-top:4px}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-icon">🧪</div>TC 자동 생성기</div>
  <div class="key-pill">
    <div class="dot" id="geminiDot" title="API 키 상태"></div>
    <input type="password" id="geminiKey" placeholder="Gemini API Key (AIza...)" autocomplete="off" />
    <button class="btn-sm" style="padding:3px 10px;font-size:11px" onclick="verifyApiKey()">확인</button>
  </div>
</header>

<div class="workspace">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">AI가 분석 중입니다...</div>
  </div>

  <div class="input-panel">
    <div class="panel-title">시나리오 입력</div>

    <div>
      <label>기능 시나리오 *</label>
      <textarea id="scenario" placeholder="기능명, 조건, 예외 케이스 등을 상세히 입력하세요.&#10;&#10;예) 미니EPG 클릭 시 채널 전환되며, 편성표가 없을 경우 '-' 표시. 스크롤 끝 도달 시 무한 스크롤 동작 등"></textarea>
    </div>

    <div>
      <label>JIRA / 기능명</label>
      <input type="text" id="jiraTitle" placeholder="예: [BPM-52765] 미니EPG 보완" />
    </div>

    <div class="row2">
      <div>
        <label>TC-ID 입력</label>
        <input type="text" id="tcPrefix" value="TC" placeholder="TC" />
      </div>
      <div>
        <label>대분류</label>
        <input type="text" id="category" value="EPG" placeholder="EPG" />
      </div>
    </div>

    <div>
      <label>구글 시트 탭 이름</label>
      <input type="text" id="sheetName" placeholder="Sheet1" value="Sheet1" />
    </div>

    <div>
      <label>모델 선택</label>
      <select id="modelSelect">
        <option value="gemini-2.0-flash">Gemini 2.0 Flash — 무료 · 권장</option>
        <option value="gemini-2.5-flash-preview-05-20">Gemini 2.5 Flash — 무료 · 최신</option>
        <option value="gemini-2.0-pro-exp-02-05">Gemini 2.0 Pro Exp — 무료 · 정교함</option>
        <option value="gemini-2.5-pro-preview-05-06">Gemini 2.5 Pro — 유료 · 고품질</option>
      </select>
    </div>

    <button class="btn-generate" id="generateBtn" onclick="generateTC()">✨ TC 초안 생성</button>
  </div>

  <div class="result-panel">
    <div class="result-bar">
      <div class="result-meta" id="resultMeta">시나리오를 입력하고 생성 버튼을 눌러주세요</div>
      <div class="btn-group">
        <button class="btn-sm" id="addRowBtn" onclick="addEmptyRow()" disabled>＋ 행 추가</button>
        <button class="btn-sm blue" id="excelBtn" onclick="downloadExcel()" disabled>⬇ Excel</button>
        <button class="btn-sm green" id="sheetsBtn" onclick="openSheetsModal()" disabled>📊 구글 시트</button>
      </div>
    </div>
    <div id="tableContainer" class="table-wrap">
      <div class="empty-state">
        <div class="icon">📋</div>
        <p>시나리오를 입력하면 TC가 생성됩니다.</p>
      </div>
    </div>
  </div>
</div>

<!-- 구글 시트 모달 -->
<div class="modal-bg" id="sheetsModal">
  <div class="modal">
    <h3>📊 구글 시트에 추가</h3>
    <label>스프레드시트 ID *</label>
    <input type="text" id="sheetId" placeholder="URL에서 /d/XXXXXXX/edit 부분의 ID" />
    <p class="hint">예: https://docs.google.com/spreadsheets/d/<strong>1BxiMVs0...</strong>/edit</p>

    <label style="margin-top:12px">Google Apps Script 웹앱 URL *</label>
    <input type="text" id="gasUrl" placeholder="https://script.google.com/macros/s/.../exec" />
    <p class="hint">Apps Script를 배포하여 URL을 입력하세요. <a href="#" onclick="openGasHelp()" style="color:var(--accent)">도움말</a></p>
    <div class="modal-actions">
      <button class="btn-modal" onclick="closeSheetsModal()">취소</button>
      <button class="btn-modal primary" onclick="uploadToSheets()">업로드</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ───────────────────────────────────────────────
   상태 관리
─────────────────────────────────────────────── */
let lastResult = [];
let isGenerating = false;

/* ───────────────────────────────────────────────
   초기화 - sessionStorage만 사용 (보안)
─────────────────────────────────────────────── */
window.onload = () => {
  // API 키는 sessionStorage에만 임시 저장 (탭 닫으면 삭제)
  const saved = sessionStorage.getItem('gemini_key');
  if (saved) {
    document.getElementById('geminiKey').value = saved;
    setStatus('ok');
  }
  // 비보안 설정값만 localStorage에 저장
  ['tcPrefix','category','jiraTitle','sheetId','sheetName','gasUrl'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const val = localStorage.getItem('pref_' + id);
    if (val) el.value = val;
    el.addEventListener('change', () => localStorage.setItem('pref_' + id, el.value));
  });
};

/* ───────────────────────────────────────────────
   API 키 실시간 검증
─────────────────────────────────────────────── */
async function verifyApiKey() {
  const key = document.getElementById('geminiKey').value.trim();
  if (!key) { showToast('API 키를 입력하세요.', 'error'); return; }
  setStatus('checking');
  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models?key=${key}`
    );
    if (res.ok) {
      // 세션 스토리지에만 저장
      sessionStorage.setItem('gemini_key', key);
      setStatus('ok');
      showToast('API 키가 유효합니다.', 'success');
    } else {
      setStatus('err');
      showToast('API 키가 유효하지 않습니다.', 'error');
    }
  } catch (e) {
    setStatus('err');
    showToast('연결 오류: ' + e.message, 'error');
  }
}

/* ───────────────────────────────────────────────
   TC 생성
─────────────────────────────────────────────── */
async function generateTC() {
  if (isGenerating) return;

  const key      = document.getElementById('geminiKey').value.trim();
  const scenario = document.getElementById('scenario').value.trim();
  const model    = document.getElementById('modelSelect').value;
  const rawPrefix = document.getElementById('tcPrefix').value.trim();
  const category = document.getElementById('category').value.trim();
  const jira     = document.getElementById('jiraTitle').value.trim();

  // 접두사에서 숫자/하이픈 제거 ("TC-001" → "TC")
  const prefix = rawPrefix.replace(/[-_\s]*\d+$/, '').trim() || 'TC';

  if (!key)      { showToast('API 키를 입력하세요.', 'error'); return; }
  if (!scenario) { showToast('시나리오를 입력하세요.', 'error'); return; }

  isGenerating = true;
  setGenerating(true);
  showLoading(true, '시나리오를 분석하여 테스트 케이스를 구성하고 있습니다...');

  const prompt = `당신은 전문 QA 엔지니어입니다. 다음 시나리오를 기반으로 SI 프로젝트 표준에 부합하는 테스트 케이스를 JSON 배열로 작성하세요.

[프로젝트/기능명]
${jira || '(미입력)'}

[대분류]
${category || '(미입력)'}

[시나리오]
${scenario}

[제약 조건]
1. 출력은 오직 JSON 배열만 허용합니다. 마크다운 코드블록(\`\`\`json) 없이 순수 JSON만 출력하세요.
2. 시나리오 복잡도에 맞게 적절한 수의 테스트 케이스를 생성하세요 (정상 + 예외 포함).
3. 각 케이스의 필드: id(형식: ${prefix}-001 부터 순서대로), title, pre_condition, test_data, test_steps, expected_result
4. 정상 케이스 외에 최소 2개 이상의 예외/경계값(Edge Case) 케이스를 포함하세요.
5. test_steps는 \\n으로 구분된 단계별 문장으로 작성하세요. (예: "1. 앱 실행\\n2. 메뉴 클릭")
6. pre_condition과 test_data는 각각 별도 필드로 분리하여 작성하세요.`;

  try {
    const response = await fetchWithRetry(
      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      }
    );

    const data = await response.json();

    // 응답 구조 검증
    if (!data.candidates || !data.candidates[0]?.content?.parts?.[0]?.text) {
      throw new Error('Gemini 응답 형식이 올바르지 않습니다. 다시 시도해주세요.');
    }

    const rawText = data.candidates[0].content.parts[0].text;

    // JSON 파싱 - 마크다운 펜스 및 불필요한 텍스트 제거
    const jsonStr = rawText
      .replace(/```json\s*/gi, '')
      .replace(/```\s*/g, '')
      .trim();

    let parsed;
    try {
      parsed = JSON.parse(jsonStr);
    } catch (parseErr) {
      // JSON이 일부만 올바른 경우 배열 추출 시도
      const match = jsonStr.match(/\[[\s\S]*\]/);
      if (match) {
        parsed = JSON.parse(match[0]);
      } else {
        throw new Error('AI 응답을 JSON으로 파싱할 수 없습니다. 다시 시도해주세요.');
      }
    }

    // 배열 여부 확인
    if (!Array.isArray(parsed) || parsed.length === 0) {
      throw new Error('생성된 TC가 없습니다. 시나리오를 더 상세히 입력해주세요.');
    }

    // 필수 필드 보정
    lastResult = parsed.map((tc, i) => ({
      id:              tc.id              || `${prefix}-${String(i+1).padStart(3,'0')}`,
      title:           tc.title           || '(제목 없음)',
      pre_condition:   tc.pre_condition   || '-',
      test_data:       tc.test_data       || '-',
      test_steps:      tc.test_steps      || '-',
      expected_result: tc.expected_result || '-',
    }));

    renderTable(lastResult);
    enableButtons(true);
    setStatus('ok');
    showToast(`${lastResult.length}개의 TC가 생성되었습니다.`, 'success');
  } catch (err) {
    console.error(err);
    showToast('생성 오류: ' + err.message, 'error');
    setStatus('err');
  } finally {
    showLoading(false);
    isGenerating = false;
    setGenerating(false);
  }
}

/* ───────────────────────────────────────────────
   fetchWithRetry - 실패 시 반드시 throw
─────────────────────────────────────────────── */
async function fetchWithRetry(url, opts, retries = 3) {
  let lastError;
  for (let i = 0; i < retries; i++) {
    try {
      const res = await fetch(url, opts);
      if (res.ok) return res;
      if (res.status === 429) {
        const wait = 2000 * (i + 1);
        showLoading(true, `요청 한도 초과, ${wait/1000}초 후 재시도... (${i+1}/${retries})`);
        await new Promise(r => setTimeout(r, wait));
        lastError = new Error('API 요청 한도 초과 (429)');
      } else if (res.status === 400) {
        const body = await res.json().catch(() => ({}));
        throw new Error(`API 오류 (400): ${body?.error?.message || '잘못된 요청'}`);
      } else if (res.status === 403) {
        throw new Error('API 키가 유효하지 않거나 권한이 없습니다. (403)');
      } else {
        throw new Error(`HTTP 오류 (${res.status})`);
      }
    } catch (e) {
      if (e.message.includes('400') || e.message.includes('403')) throw e;
      lastError = e;
    }
  }
  throw lastError || new Error('알 수 없는 오류로 요청에 실패했습니다.');
}

/* ───────────────────────────────────────────────
   테이블 렌더링 (인라인 편집 + 개별 삭제/재생성)
─────────────────────────────────────────────── */
function renderTable(tcs) {
  const container = document.getElementById('tableContainer');
  let html = `<table>
    <thead><tr>
      <th style="width:90px">ID</th>
      <th style="width:160px">테스트 명칭</th>
      <th style="width:130px">사전 조건</th>
      <th style="width:130px">테스트 데이터</th>
      <th>테스트 단계</th>
      <th style="width:160px">예상 결과</th>
      <th style="width:80px">관리</th>
    </tr></thead><tbody>`;

  tcs.forEach((tc, idx) => {
    html += `<tr id="row-${idx}">
      <td class="tc-id" contenteditable="true" data-idx="${idx}" data-field="id" onblur="onCellEdit(this)">${escHtml(tc.id)}</td>
      <td contenteditable="true" data-idx="${idx}" data-field="title" onblur="onCellEdit(this)"><strong>${escHtml(tc.title)}</strong></td>
      <td class="pre" contenteditable="true" data-idx="${idx}" data-field="pre_condition" onblur="onCellEdit(this)">${escHtml(tc.pre_condition)}</td>
      <td class="pre" contenteditable="true" data-idx="${idx}" data-field="test_data" onblur="onCellEdit(this)">${escHtml(tc.test_data)}</td>
      <td class="pre" contenteditable="true" data-idx="${idx}" data-field="test_steps" onblur="onCellEdit(this)">${escHtml(tc.test_steps)}</td>
      <td class="pre" contenteditable="true" data-idx="${idx}" data-field="expected_result" onblur="onCellEdit(this)">${escHtml(tc.expected_result)}</td>
      <td>
        <div class="tc-actions">
          <button class="tc-btn" onclick="regenerateRow(${idx})" title="이 TC만 재생성">↻</button>
          <button class="tc-btn danger" onclick="deleteRow(${idx})" title="삭제">✕</button>
        </div>
      </td>
    </tr>`;
  });

  html += `</tbody></table>`;
  container.innerHTML = html;
  document.getElementById('resultMeta').textContent = `총 ${tcs.length}개의 테스트 케이스`;
}

/* ───────────────────────────────────────────────
   인라인 편집 반영
─────────────────────────────────────────────── */
function onCellEdit(el) {
  const idx   = parseInt(el.dataset.idx);
  const field = el.dataset.field;
  if (lastResult[idx] !== undefined) {
    lastResult[idx][field] = el.innerText.trim();
  }
}

/* ───────────────────────────────────────────────
   행 추가
─────────────────────────────────────────────── */
function addEmptyRow() {
  const prefix = (document.getElementById('tcPrefix').value.trim().replace(/[-_\s]*\d+$/, '') || 'TC');
  const newIdx = lastResult.length + 1;
  lastResult.push({
    id:              `${prefix}-${String(newIdx).padStart(3,'0')}`,
    title:           '새 TC',
    pre_condition:   '-',
    test_data:       '-',
    test_steps:      '1. ',
    expected_result: '-',
  });
  renderTable(lastResult);
  // 새 행으로 스크롤
  const rows = document.querySelectorAll('#tableContainer tbody tr');
  rows[rows.length - 1]?.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

/* ───────────────────────────────────────────────
   행 삭제
─────────────────────────────────────────────── */
function deleteRow(idx) {
  if (lastResult.length <= 1) { showToast('마지막 TC는 삭제할 수 없습니다.', 'error'); return; }
  lastResult.splice(idx, 1);
  // ID 재번호 부여 (패턴 유지)
  const prefix = lastResult[0]?.id?.replace(/-\d+$/, '') || 'TC';
  lastResult.forEach((tc, i) => {
    if (/^[A-Za-z]+-\d+$/.test(tc.id)) {
      tc.id = `${prefix}-${String(i+1).padStart(3,'0')}`;
    }
  });
  renderTable(lastResult);
}

/* ───────────────────────────────────────────────
   개별 TC 재생성
─────────────────────────────────────────────── */
async function regenerateRow(idx) {
  const key      = document.getElementById('geminiKey').value.trim();
  const scenario = document.getElementById('scenario').value.trim();
  const model    = document.getElementById('modelSelect').value;
  if (!key || !scenario) { showToast('API 키와 시나리오를 확인하세요.', 'error'); return; }

  const row = document.getElementById(`row-${idx}`);
  if (row) row.style.opacity = '0.4';

  const oldTc = lastResult[idx];
  const prompt = `당신은 전문 QA 엔지니어입니다. 다음 시나리오에서 기존 TC와 중복되지 않는 새로운 테스트 케이스 1개를 JSON 객체로 작성하세요.
[시나리오]
${scenario}
[기존 TC 제목 (중복 금지)]
${oldTc.title}
[제약]
1. 순수 JSON 객체만 출력 (마크다운 없음)
2. 필드: id(${oldTc.id}), title, pre_condition, test_data, test_steps, expected_result`;

  try {
    const res = await fetchWithRetry(
      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
      { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ contents:[{ parts:[{ text: prompt }] }] }) }
    );
    const data = await res.json();
    const rawText = data.candidates[0].content.parts[0].text;
    const jsonStr = rawText.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();

    // 객체 또는 배열 둘 다 허용
    let parsed = JSON.parse(jsonStr);
    if (Array.isArray(parsed)) parsed = parsed[0];

    lastResult[idx] = {
      id:              parsed.id              || oldTc.id,
      title:           parsed.title           || oldTc.title,
      pre_condition:   parsed.pre_condition   || '-',
      test_data:       parsed.test_data       || '-',
      test_steps:      parsed.test_steps      || '-',
      expected_result: parsed.expected_result || '-',
    };
    renderTable(lastResult);
    showToast('TC가 재생성되었습니다.', 'success');
  } catch (e) {
    showToast('재생성 실패: ' + e.message, 'error');
    if (row) row.style.opacity = '1';
  }
}

/* ───────────────────────────────────────────────
   Excel 다운로드 (JIRA·대분류 파일명 포함)
─────────────────────────────────────────────── */
async function downloadExcel() {
  const jira     = document.getElementById('jiraTitle').value.trim();
  const category = document.getElementById('category').value.trim();

  const workbook = new ExcelJS.Workbook();
  workbook.creator = 'TC 자동 생성기';
  workbook.created = new Date();

  const ws = workbook.addWorksheet('TC_Results');
  ws.columns = [
    { header:'ID',       key:'id',        width:14 },
    { header:'제목',     key:'title',      width:32 },
    { header:'대분류',   key:'category',   width:14 },
    { header:'사전 조건',key:'pre',        width:28 },
    { header:'테스트 데이터', key:'data',  width:24 },
    { header:'테스트 단계',   key:'steps', width:44 },
    { header:'예상 결과',key:'exp',        width:44 },
  ];

  // 헤더 스타일
  ws.getRow(1).eachCell(cell => {
    cell.fill = { type:'pattern', pattern:'solid', fgColor:{ argb:'FF1E2235' } };
    cell.font = { bold:true, color:{ argb:'FF8B90A8' }, size:11 };
    cell.alignment = { vertical:'middle', horizontal:'center' };
    cell.border = { bottom:{ style:'thin', color:{ argb:'FF555A72' } } };
  });

  lastResult.forEach(v => {
    const row = ws.addRow({
      id:       v.id,
      title:    v.title,
      category: category,
      pre:      v.pre_condition,
      data:     v.test_data,
      steps:    v.test_steps,
      exp:      v.expected_result,
    });
    row.alignment = { wrapText:true, vertical:'top' };
  });

  ws.getColumn('steps').alignment = { wrapText:true, vertical:'top' };
  ws.getColumn('exp').alignment   = { wrapText:true, vertical:'top' };

  const buf  = await workbook.xlsx.writeBuffer();
  const blob = new Blob([buf], { type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);

  // 파일명: TC_대분류_JIRA키_타임스탬프.xlsx
  const jiraKey = jira.match(/\[([^\]]+)\]/)?.[1] || jira.replace(/\s+/g,'_') || 'export';
  const ts      = new Date().toISOString().slice(0,10);
  a.download    = `TC_${category || 'export'}_${jiraKey}_${ts}.xlsx`;
  a.click();
  showToast('Excel 파일을 다운로드했습니다.', 'success');
}

/* ───────────────────────────────────────────────
   구글 시트 업로드 (Apps Script 웹앱 경유)
─────────────────────────────────────────────── */
function openSheetsModal()  { document.getElementById('sheetsModal').classList.add('show'); }
function closeSheetsModal() { document.getElementById('sheetsModal').classList.remove('show'); }

function openGasHelp() {
  alert(
    '📌 Google Apps Script 설정 방법\n\n' +
    '1. script.google.com에서 새 프로젝트 생성\n' +
    '2. 아래 코드를 붙여넣기:\n\n' +
    'function doPost(e){\n' +
    '  var data = JSON.parse(e.postData.contents);\n' +
    '  var ss = SpreadsheetApp.openById(data.sheetId);\n' +
    '  var ws = ss.getSheetByName(data.sheetName) || ss.insertSheet(data.sheetName);\n' +
    '  if(ws.getLastRow()===0) ws.appendRow(data.headers);\n' +
    '  data.rows.forEach(function(r){ ws.appendRow(r); });\n' +
    '  return ContentService.createTextOutput("ok");\n' +
    '}\n\n' +
    '3. 배포 → 새 배포 → 웹앱 → 액세스: 모든 사용자\n' +
    '4. 배포 URL을 위 입력란에 붙여넣기'
  );
}

async function uploadToSheets() {
  const gasUrl    = document.getElementById('gasUrl').value.trim();
  const sheetId   = document.getElementById('sheetId').value.trim();
  const sheetName = document.getElementById('sheetName').value.trim() || 'Sheet1';
  const category  = document.getElementById('category').value.trim();

  if (!gasUrl)   { showToast('Apps Script URL을 입력하세요.', 'error'); return; }
  if (!sheetId)  { showToast('스프레드시트 ID를 입력하세요.', 'error'); return; }
  if (lastResult.length === 0) { showToast('업로드할 TC가 없습니다.', 'error'); return; }

  closeSheetsModal();
  showLoading(true, '구글 시트에 업로드 중...');

  const payload = {
    sheetId,
    sheetName,
    headers: ['ID','제목','대분류','사전 조건','테스트 데이터','테스트 단계','예상 결과'],
    rows: lastResult.map(v => [v.id, v.title, category, v.pre_condition, v.test_data, v.test_steps, v.expected_result]),
  };

  try {
    const res = await fetch(gasUrl, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain' }, // GAS CORS 우회
      body:    JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(`서버 오류 (${res.status})`);
    showToast('구글 시트에 업로드 완료!', 'success');
  } catch (e) {
    showToast('업로드 실패: ' + e.message, 'error');
  } finally {
    showLoading(false);
  }
}

/* ───────────────────────────────────────────────
   유틸
─────────────────────────────────────────────── */
function escHtml(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function showLoading(show, msg) {
  const overlay = document.getElementById('loadingOverlay');
  overlay.className = show ? 'loading-overlay show' : 'loading-overlay';
  if (msg) document.getElementById('loadingText').textContent = msg;
}

function setGenerating(on) {
  const btn = document.getElementById('generateBtn');
  btn.disabled    = on;
  btn.textContent = on ? '⏳ 생성 중...' : '✨ TC 초안 생성';
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = (type === 'success' ? '✓ ' : type === 'error' ? '✕ ' : '') + msg;
  t.className   = `toast show${type ? ' ' + type : ''}`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = 'toast'; }, 3500);
}

function setStatus(state) {
  const dot = document.getElementById('geminiDot');
  dot.className = 'dot' + (state === 'ok' ? ' ok' : state === 'err' ? ' err' : state === 'checking' ? ' checking' : '');
}

function enableButtons(enabled) {
  ['excelBtn','sheetsBtn','addRowBtn'].forEach(id => {
    document.getElementById(id).disabled = !enabled;
  });
}
</script>
