<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TC 자동 생성기 Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#21253a;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--accent:#4f8fff;--accent2:#7c5cfc;--text:#e8eaf0;--text2:#8b90a8;--text3:#555a72;--success:#3ecf8e;--danger:#f43f5e}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
  
  /* 보안 관련 스타일 */
  .key-container { position: relative; width: 100%; }
  .key-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text3); }

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .logo{font-weight:700;font-size:1.2rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:flex;align-items:center;gap:8px}
  
  main{flex:1;padding:2rem;max-width:1400px;margin:0 auto;width:100%;display:grid;grid-template-columns:380px 1fr;gap:2rem}
  
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;display:flex;flex-direction:column;overflow:hidden}
  .panel-header{padding:1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.02)}
  .panel-title{font-size:0.9rem;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:8px}
  
  .config-body{padding:1.5rem;gap:1.5rem;display:flex;flex-direction:column}
  .form-group{display:flex;flex-direction:column;gap:8px}
  label{font-size:0.85rem;font-weight:500;color:var(--text2)}
  input,select,textarea{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);padding:0.8rem 1rem;font-family:inherit;font-size:0.95rem;transition:all 0.2s}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,143,255,0.15)}
  textarea{resize:none;height:240px;line-height:1.6}
  
  .btn{border:none;border-radius:10px;padding:0.8rem 1.2rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;font-size:0.95rem}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,143,255,0.3)}
  .btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
  .btn-secondary:hover{background:rgba(255,255,255,0.05)}
  
  /* 테이블 편집 가능 스타일 */
  .table-container{padding:0;overflow:auto;height:100%;position:relative}
  table{width:100%;border-collapse:collapse;font-size:0.9rem;table-layout:fixed}
  th{background:var(--surface2);position:sticky;top:0;z-index:10;padding:1rem;text-align:left;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border2)}
  td{padding:1rem;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5}
  td[contenteditable="true"]:focus { outline: 2px solid var(--accent); background: rgba(79,143,255,0.05); }
  
  .pre{white-space:pre-wrap;word-break:break-all;font-family:'JetBrains Mono',monospace;font-size:0.85rem}
  .loading-overlay{position:fixed;inset:0;background:rgba(15,17,23,0.8);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:1rem}
  .loading-overlay.show{display:flex}
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface2);border:1px solid var(--border2);padding:0.8rem 1.5rem;border-radius:12px;z-index:2000;transition:0.3s;opacity:0}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<header>
  <div class="logo">TC Generator Pro</div>
  <div style="display:flex;gap:12px">
    <div class="form-group" style="flex-direction:row;align-items:center;gap:10px">
      <div class="key-container">
        <input type="password" id="geminiKey" placeholder="Gemini API Key 입력" style="width:280px;padding-right:40px">
        <span class="key-toggle" onclick="toggleKeyVisibility()">👁️</span>
      </div>
    </div>
    <select id="modelSelect" style="width:160px">
      <option value="gemini-1.5-flash">1.5 Flash (속도)</option>
      <option value="gemini-1.5-pro">1.5 Pro (정밀)</option>
    </select>
  </div>
</header>

<main>
  <section class="panel">
    <div class="panel-header">
      <span class="panel-title">상세 시나리오 입력</span>
      <span id="statusText" style="font-size:0.8rem;color:var(--text3)">준비됨</span>
    </div>
    <div class="config-body">
      <div class="form-group">
        <textarea id="scenarioInput" placeholder="테스트 케이스로 변환할 기획서 내용이나 시나리오를 자유롭게 입력하세요..."></textarea>
      </div>
      <button class="btn btn-primary" id="generateBtn" onclick="generateTC()">
        <span>TC 생성 시작 (Ctrl+Enter)</span>
      </button>
    </div>
  </section>

  <section class="panel">
    <div class="panel-header">
      <span class="panel-title">생성된 테스트 케이스 (내용 클릭 시 직접 수정 가능)</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" onclick="exportToExcel()">Excel 저장</button>
      </div>
    </div>
    <div class="table-container" id="resultArea">
      <div style="display:flex;height:100%;align-items:center;justify-content:center;color:var(--text3);flex-direction:column;gap:1rem">
        <p>시나리오를 입력하고 생성 버튼을 눌러주세요.</p>
      </div>
    </div>
  </section>
</main>

<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div>
  <div id="loadingText" style="font-weight:500">AI가 테스트 케이스를 설계하고 있습니다...</div>
</div>

<div id="toast" class="toast"></div>

<script>
let generatedData = [];

function toggleKeyVisibility() {
    const input = document.getElementById('geminiKey');
    input.type = input.type === 'password' ? 'text' : 'password';
}

async function generateTC() {
    const key = document.getElementById('geminiKey').value.trim();
    const scenario = document.getElementById('scenarioInput').value.trim();
    const model = document.getElementById('modelSelect').value;

    if(!key) return showToast("API 키를 입력해주세요.", "danger");
    if(!scenario) return showToast("시나리오를 입력해주세요.", "danger");

    localStorage.setItem('gemini_key', key);
    showLoading(true, "시나리오 분석 중...");

    const prompt = `당신은 전문 QA 엔지니어입니다. 다음 시나리오를 바탕으로 상세 테스트 케이스(TC)를 작성하여 JSON 배열 형식으로만 응답하세요.
    응답 형식: [{"id": "TC-01", "title": "제목", "priority": "P0", "test_steps": "1. 수행\\n2. 수행", "expected_result": "결과"}]
    
    시나리오:
    ${scenario}`;

    try {
        const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: {
                    response_mime_type: "application/json" // JSON Mode 강제
                }
            })
        });

        const data = await resp.json();
        if(data.error) throw new Error(data.error.message);
        
        const rawText = data.candidates[0].content.parts[0].text;
        generatedData = JSON.parse(rawText);
        
        renderTable(generatedData);
        showToast("TC 생성이 완료되었습니다.");
    } catch(e) {
        console.error(e);
        showToast("생성 실패: " + e.message, "danger");
    } finally {
        showLoading(false);
    }
}

function renderTable(data) {
    const area = document.getElementById('resultArea');
    if(!data || data.length === 0) {
        area.innerHTML = `<div style="padding:2rem;text-align:center;color:var(--text3)">결과가 없습니다.</div>`;
        return;
    }

    let html = `<table><thead><tr>
        <th style="width:80px">ID</th>
        <th style="width:150px">우선순위</th>
        <th>테스트 타이틀</th>
        <th>수행 단계 (수정 가능)</th>
        <th>기대 결과 (수정 가능)</th>
    </tr></thead><tbody>`;

    html += data.map((tc, idx) => `
        <tr>
            <td>${tc.id || 'TC-'+(idx+1)}</td>
            <td>${tc.priority || 'P2'}</td>
            <td contenteditable="true">${tc.title}</td>
            <td contenteditable="true" class="pre">${tc.test_steps}</td>
            <td contenteditable="true" class="pre">${tc.expected_result}</td>
        </tr>
    `).join('');

    html += `</tbody></table>`;
    area.innerHTML = html;
}

async function exportToExcel() {
    const table = document.querySelector('table');
    if(!table) return showToast("내보낼 데이터가 없습니다.", "danger");

    const workbook = new ExcelJS.Workbook();
    const worksheet = workbook.addWorksheet('TestCases');

    // 헤더 추출 및 스타일링
    const headers = Array.from(table.querySelectorAll('th')).map(th => th.innerText);
    const headerRow = worksheet.addRow(headers);
    headerRow.eachCell(cell => {
        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFE9E9E9' } };
        cell.font = { bold: true };
        cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
    });

    // 데이터 추출 (수정된 내용 반영)
    const rows = table.querySelectorAll('tbody tr');
    rows.forEach(tr => {
        const rowData = Array.from(tr.querySelectorAll('td')).map(td => td.innerText);
        const row = worksheet.addRow(rowData);
        row.alignment = { vertical: 'top', wrapText: true };
    });

    // 열 너비 자동 조절
    worksheet.columns.forEach((col, i) => {
        col.width = i < 2 ? 10 : 40;
    });

    const buffer = await workbook.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `TC_Export_${new Date().getTime()}.xlsx`;
    a.click();
}

function showLoading(show, msg){
    document.getElementById('loadingOverlay').className='loading-overlay'+(show?' show':'');
    if(msg) document.getElementById('loadingText').textContent=msg;
    document.getElementById('generateBtn').disabled=show;
}

function showToast(msg, type=''){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3000);
}

// 초기 키 복구
const savedKey = localStorage.getItem('gemini_key');
if(savedKey) document.getElementById('geminiKey').value = savedKey;

document.addEventListener('keydown', e => {
    if(e.ctrlKey && e.key === 'Enter') generateTC();
});
</script>
</body>
</html>
